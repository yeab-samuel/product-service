version: '3.9'
services:
  db:
    image: postgres:15-alpine
    container_name: shopwave-db
    environment:
      POSTGRES_DB: shopwave
      POSTGRES_USER: shopwave
      POSTGRES_PASSWORD: shopwave_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - shopwave_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopwave"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    container_name: shopwave-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/shopwave
      DB_USER: shopwave
      DB_PASS: shopwave_dev_pass
    ports:
      - "8080:8080"

volumes:
  shopwave_pg_data:
