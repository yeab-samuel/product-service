# Prod profile: PostgreSQL via Docker. Values from environment variables.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/shopwave}
spring.datasource.username=${DB_USER:shopwave}
spring.datasource.password=${DB_PASS:shopwave_dev_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=60000
